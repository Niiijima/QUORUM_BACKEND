name: CI Pipeline

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    #Step 1: Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

    #Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

    #Step 3: Install dependencies
      - name: Install dependencies
        run: npm install

    #Step 4: Run lint
      - name: Run lint
        run: npm run lint

    #Step 5: Run tests
      - name: Run tests
        run: npm test

    #Step 6: Deploy to Render (only on main branch)
      - name: Deploy to Render
        run: echo "Deploy script goes here"
